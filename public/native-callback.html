<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Completing sign in...</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #333; font-size: 14px; padding: 20px; }
    .spinner { width: 32px; height: 32px; border: 4px solid #eee; border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    (function () {
      var hash  = new URLSearchParams(window.location.hash.substring(1));
      var query = new URLSearchParams(window.location.search);
      function pick(key) { return hash.get(key) || query.get(key); }

      // deeplink scheme travels via OAuth `state` — present only for native (Despia) flows
      var scheme      = pick('state') || pick('deeplink_scheme');
      var accessToken = pick('access_token');
      var error       = pick('error');
      var isDespia    = navigator.userAgent.toLowerCase().indexOf('despia') !== -1;

      if (scheme && isDespia) {
        // Native: fire the deeplink back into the app WebView (token rides the query).
        var deeplink;
        if (error) deeplink = scheme + '://oauth/auth?error=' + encodeURIComponent(error);
        else if (accessToken) deeplink = scheme + '://oauth/auth?provider=google&token=' + encodeURIComponent(accessToken);
        else deeplink = scheme + '://oauth/auth?error=no_access_token';
        window.location.href = deeplink;
      } else {
        // Web: route to /auth with the token in the hash.
        if (error) window.location.href = '/auth?error=' + encodeURIComponent(error);
        else if (accessToken) window.location.href = '/auth#access_token=' + encodeURIComponent(accessToken);
        else window.location.href = '/auth?error=no_access_token';
      }
    })();
  </script>
</body>
</html>
