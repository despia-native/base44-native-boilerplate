<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in…</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #555;
    }
    .spinner {
      width: 32px; height: 32px; border: 4px solid #eee; border-top-color: #111;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    (function () {
      // Google returns the token in the URL hash (response_type=token) and our
      // deeplink scheme in `state`. Grab both from hash and query.
      var hash = new URLSearchParams(window.location.hash.substring(1));
      var query = new URLSearchParams(window.location.search);

      var token = hash.get('access_token') || query.get('access_token');
      var error = hash.get('error') || query.get('error');
      var scheme = hash.get('state') || query.get('state'); // e.g. "myapp"

      var isNative = navigator.userAgent.toLowerCase().indexOf('despia') !== -1;

      var payload = token ? ('access_token=' + encodeURIComponent(token))
                          : ('error=' + encodeURIComponent(error || 'no_token'));

      if (isNative && scheme) {
        // Deep-link back into the native app so the OS reopens it on /auth with the token.
        var deeplink = scheme + '://auth?' + payload;
        // In a WebView an <a> click reliably fires the OS deep-link handler,
        // where window.location assignment is often swallowed.
        var a = document.createElement('a');
        a.href = deeplink;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        // Fallbacks in case the click is blocked.
        setTimeout(function () { window.location.href = deeplink; }, 150);
        setTimeout(function () { window.location = deeplink; }, 400);
      } else {
        // Web: forward straight to the in-app /auth handler via the hash.
        window.location.replace('/auth#' + payload);
      }
    })();
  </script>
</body>
</html>
