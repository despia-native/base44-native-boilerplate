<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signing you in…</title>
</head>
<body style="margin:0;background:#0d0c10;color:#f4f2ee;font-family:-apple-system,sans-serif">
  <p style="text-align:center;margin-top:45vh;font-size:15px">Signing you in…</p>
  <script>
    // Google OAuth callback — authorization code flow.
    // The one-time code arrives as a QUERY param (?code=...). We forward it to
    // the app; the backend exchanges it for tokens using the client secret, so
    // no access token ever appears in a URL.
    var q = new URLSearchParams(location.search);
    var code = q.get('code');
    var error = q.get('error');
    var scheme = q.get('state'); // the app's deep-link scheme travels via state

    var params = new URLSearchParams();
    if (code) params.set('code', code);
    if (error) params.set('error', error);
    var query = params.toString();

    if (scheme && /^[a-z][a-z0-9+.-]*$/i.test(scheme)) {
      // Native: bounce back into the app via its deep-link scheme.
      location.href = scheme + '://auth?' + query;
      // Web fallback: in a normal browser tab the custom scheme is a no-op,
      // so after a moment continue to the in-app /auth page on this origin.
      setTimeout(function () { location.replace('/auth?' + query); }, 1200);
    } else {
      location.replace('/auth?' + query);
    }
  </script>
</body>
</html>
