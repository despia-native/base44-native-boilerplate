<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in…</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #555;
    }
    .spinner {
      width: 32px; height: 32px; border: 4px solid #eee; border-top-color: #111;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    (function () {
      // This page is ONLY ever reached in the native flow — Google opens it inside a
      // Safari/in-app browser session (not the Despia WebView), so UA detection is
      // useless here. Web users never land here; they go straight to /auth.
      // Therefore: ALWAYS deep-link back into the native app.
      var hash = new URLSearchParams(window.location.hash.substring(1));
      var query = new URLSearchParams(window.location.search);

      var token = hash.get('access_token') || query.get('access_token');
      var error = hash.get('error') || query.get('error');
      var scheme = hash.get('state') || query.get('state'); // deeplink scheme, e.g. "myapp"

      var payload = token ? ('access_token=' + encodeURIComponent(token))
                          : ('error=' + encodeURIComponent(error || 'no_token'));

      var deeplink = (scheme || 'myapp') + '://auth?' + payload;

      // An <a> click reliably fires the OS deep-link handler where a plain
      // window.location assignment is often swallowed by the browser.
      var a = document.createElement('a');
      a.href = deeplink;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      // Fallbacks in case the click is blocked.
      setTimeout(function () { window.location.href = deeplink; }, 150);
      setTimeout(function () { window.location = deeplink; }, 400);
    })();
  </script>
</body>
</html>
